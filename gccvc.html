<meta charset="UTF-8">

<title>M3U8影视库</title>

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
body{background:#0f172a;color:#f1f5f9;padding-bottom:30px;}
/*顶部导航栏*/
.header{position:sticky;top:0;background:#1e293b;padding:16px 20px;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.header-title{font-size:20px;font-weight:600;color:#38bdf8;text-align:center;}
/*标签栏 全部/收藏/历史*/
.tab-wrap{display:flex;padding:12px 20px;gap:12px;overflow-x:auto;}
.tab-item{flex:0 0 auto;padding:8px 20px;border-radius:20px;font-size:15px;background:#1e293b;color:#cbd5e1;cursor:pointer;}
.tab-item.active{background:#38bdf8;color:#0f172a;font-weight:500;}
/*搜索框*/
.search-wrap{padding:0 20px 16px;}
.search-input{width:100%;padding:14px 16px;background:#1e293b;border:1px solid #334155;border-radius:12px;color:#f1f5f9;font-size:15px;outline:none;}
.search-input::placeholder{color:#94a3b8;}
.search-input:focus{border-color:#38bdf8;}
/*播放器区域*/
.player-wrap{margin:0 20px 20px;border-radius:12px;overflow:hidden;background:#000;display:none;}
#video-player{width:100%;display:block;}
.player-tip{text-align:center;color:#94a3b8;font-size:13px;padding:8px 0;margin-top:8px;}
/*网格列表布局 2列精致卡片*/
.list-wrap{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:0 20px;}
.video-card{background:#1e293b;border-radius:12px;padding:14px;position:relative;cursor:pointer;transition:all 0.2s ease;}
.video-card:active{transform:scale(0.97);background:#334155;}
.card-name{font-size:15px;color:#e2e8f0;line-height:1.5;word-break:break-all;}
/*收藏星星图标*/
.star-icon{position:absolute;right:12px;top:12px;font-size:16px;color:#fbbf24;}
/*长按弹出菜单*/
.operate-menu{position:absolute;z-index:999;background:#1e293b;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.4);overflow:hidden;display:none;width:130px;top:100%;left:0;margin-top:8px;}
.menu-option{padding:12px 16px;font-size:14px;color:#e2e8f0;border-bottom:1px solid #334155;}
.menu-option:last-child{border-bottom:none;}
/*无数据提示*/
.empty-box{grid-column:1/-1;text-align:center;padding:60px 0;color:#94a3b8;font-size:15px;}
</style>
</head>
<body>

    <div class="header-title">M3U8高清影视库</div>
</div>

<div class="tab-wrap">
    <div class="tab-item active" data-tab="all">全部影片</div>
    <div class="tab-item" data-tab="star">我的收藏</div>
    <div class="tab-item" data-tab="history">播放历史</div>
</div>

<!--搜索框-->
<div class="search-wrap">
    <input type="text" class="search-input" placeholder="输入影片名称搜索...">

<!--播放器-->
<div class="player-wrap" id="playerBox">
    <video id="video-player" controls autoplay preload="auto" playsinline></video>
    <div class="player-tip">HLS极速流媒体内核 · 弱网自动缓冲</div>
</div>

<!--影片列表-->

const player = document.getElementById('video-player');
const playerBox = document.getElementById('playerBox');
const listBox = document.getElementById('listBox');
const emptyTip = document.getElementById('emptyTip');
const searchInput = document.querySelector('.search-input');

//唤起1DM/IDM Plus下载
function startDownload(url,name){
    window.location.href = `idmplus://download?url=${encodeURIComponent(url)}&name=${encodeURIComponent(name)}`;
}

//保存播放历史
function saveHistory(item){
    const index = playHistory.findIndex(v=>v.url===item.url);
    if(index>-1) playHistory.splice(index,1);
    playHistory.unshift(item);
    if(playHistory.length>20) playHistory.length=20;
    localStorage.setItem('playHistory',JSON.stringify(playHistory));
}

//切换收藏状态
function toggleStar(item){
    const index = starList.findIndex(v=>v.url===item.url);
    if(index>-1){
        starList.splice(index,1);
    }else{
        starList.push(item);
    }
    localStorage.setItem('starList',JSON.stringify(starList));
    renderList();
}

//初始化HLS播放器
function initPlayer(m3u8Url){
    if(hls){hls.destroy();hls=null;}
    if(Hls && Hls.isSupported()){
        hls = new Hls({
            startLevel:-1,maxBufferLength:25,enableWorker:true,lowLatencyMode:true
        });
        hls.loadSource(m3u8Url);
        hls.attachMedia(player);
        hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play().catch(()=>{}));
        hls.on(Hls.Events.ERROR,(e,data)=>{
            if(data.fatal) hls.loadSource(m3u8Url);
        });
    }else{
        player.src = m3u8Url;
        player.load();
        player.play().catch(()=>{});
    }
}

//渲染影片列表
function renderList(){
    listBox.innerHTML = '';
    let filterData = [];
    const keyword = searchInput.value.trim().toLowerCase();

    //区分标签数据
    if(currentTab === 'all') filterData = videoData;
    if(currentTab === 'star') filterData = starList;
    if(currentTab === 'history') filterData = playHistory;

    //搜索筛选
    filterData = filterData.filter(item=>item.name.toLowerCase().includes(keyword));

    if(filterData.length === 0){
        emptyTip.style.display = 'block';
        return;
    }
    emptyTip.style.display = 'none';

    filterData.forEach(item=>{
        const isStar = starList.some(v=>v.url === item.url);
        const realUrl = item.url || item.uRl;

        const card = document.createElement('div');
        card.className = 'video-card';

        const starIcon = document.createElement('div');
        starIcon.className = 'star-icon';
        starIcon.innerText = isStar ? '★' : '☆';
        starIcon.onclick = (e)=>{
            e.stopPropagation();
            toggleStar(item);
        };

        const nameText = document.createElement('div');
        nameText.className = 'card-name';
        nameText.innerText = item.name;

        //长按菜单
        const menu = document.createElement('div');
        menu.className = 'operate-menu';
        const copyOption = document.createElement('div');
        copyOption.className = 'menu-option';
        copyOption.innerText = '复制链接';
        const downOption = document.createElement('div');
        downOption.className = 'menu-option';
        downOption.innerText = 'IDM下载';
        menu.appendChild(copyOption);
        menu.appendChild(downOption);
        card.appendChild(menu);

        card.appendChild(starIcon);
        card.appendChild(nameText);

        //单击卡片播放视频
        card.onclick = ()=>{
            menu.style.display = 'none';
            playerBox.style.display = 'block';
            initPlayer(realUrl);
            saveHistory(item);
            //页面滚动到播放器位置
            playerBox.scrollIntoView({behavior:'smooth',block:'start'});
        };

        //长按弹出菜单
        let pressTimer = null;
        card.addEventListener('touchstart',()=>{
            pressTimer = setTimeout(()=>{
                menu.style.display = 'block';
            },600);
        });
        card.addEventListener('touchend',()=>clearTimeout(pressTimer));
        card.addEventListener('touchcancel',()=>clearTimeout(pressTimer));

        //点击页面任意位置关闭菜单
        document.addEventListener('touchstart',(e)=>{
            if(!card.contains(e.target)) menu.style.display = 'none';
        });

        //复制链接
        copyOption.onclick = (e)=>{
            e.stopPropagation();
            menu.style.display = 'none';
            navigator.clipboard.writeText(realUrl).then(()=>alert('链接已复制到剪贴板'));
        };

        //IDM下载
        downOption.onclick = (e)=>{
            e.stopPropagation();
            menu.style.display = 'none';
            startDownload(realUrl,item.name);
        };

        listBox.appendChild(card);
    });
}

//标签切换事件
document.querySelectorAll('.tab-item').forEach(tab=>{
    tab.addEventListener('click',()=>{
        document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
        tab.classList.add('active');
        currentTab = tab.dataset.tab;
        renderList();
    });
});

//搜索实时筛选
searchInput.addEventListener('input',renderList);

//页面初始化加载列表
renderList();
